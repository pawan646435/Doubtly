<svg width="400" height="140" viewBox="0 0 400 140" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradient Animation -->
    <linearGradient id="grad" x1="0" y1="0" x2="400" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff">
        <animate attributeName="stop-color" values="#00e5ff;#8b5cf6;#00e5ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" values="#8b5cf6;#00e5ff;#8b5cf6" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="120" y1="45" x2="340" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff">
        <animate attributeName="stop-color" values="#00e5ff;#8b5cf6;#00e5ff" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" values="#8b5cf6;#00e5ff;#8b5cf6" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Floating Chat Bubble -->
  <g filter="url(#glow)">
    <rect x="20" y="35" rx="22" width="90" height="65" fill="url(#grad)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-4; 0,0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <polygon points="50,95 70,120 86,95" fill="url(#grad)"/>
  </g>

  <!-- Pulsing Spark -->
    <path d="M68 50 L74 62 L88 68 L74 74 L68 88 L62 74 L48 68 L62 62 Z"
      fill="white">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale"
      values="1;1.2;1" dur="1.5s" repeatCount="indefinite" additive="sum"/>
  </path>

  <!-- Text — uses gradient fill so it's visible on both dark and light backgrounds -->
  <text x="140" y="82"
        font-family="'Space Grotesk', Poppins, sans-serif"
        font-size="50"
        font-weight="600"
        fill="url(#textGrad)"
        opacity="0">
    Doubtly
    <animate attributeName="opacity" from="0" to="1" dur="1.5s" fill="freeze"/>
    <animate attributeName="x" from="120" to="140" dur="1.5s" fill="freeze"/>
  </text>

</svg>
